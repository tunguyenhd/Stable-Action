name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build App (Không cần chứng chỉ)
        run: |
          xcodebuild clean build \
            -project "Stable Action.xcodeproj" \
            -scheme "Stable Action" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.0 \
            ASSETCATALOG_COMPILER_APPICON_NAME=AppIcon \
            SYMROOT="$PWD/build"

      - name: Đóng gói thành file .ipa
        run: |
          APP_PATH=$(find "$PWD/build/Release-iphoneos" -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r StableAction.ipa Payload
          echo "IPA size:"
          ls -lh StableAction.ipa

      - name: Tải file IPA lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StableAction-IPA
          path: StableAction.ipa
          retention-days: 7
