name: Build IPA

on:
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest # Sử dụng máy Mac ảo của GitHub

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build App (Không cần chứng chỉ)
        run: |
          xcodebuild clean build \
            -project "Stable Action.xcodeproj" \
            -scheme "Stable Action" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SYMROOT=$(PWD)/build

      - name: Đóng gói thành file .ipa
        run: |
          mkdir -p Payload
          mv "build/Release-iphoneos/Stable Action.app" Payload/
          zip -r StableAction.ipa Payload

      - name: Tải file IPA lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StableAction-IPA
          path: StableAction.ipa
